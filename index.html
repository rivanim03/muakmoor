<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Makmur Grosir - Toko Online</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="store-name">Makmur Grosir</h1>
            <p class="store-tagline">Grosir Murah & Terpercaya</p>
        </div>
        <button class="cart-btn" id="cartBtn" aria-label="Keranjang">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </button>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Cari produk..." autocomplete="off">
        </div>
    </div>

    <!-- Kategori -->
    <div class="categories-wrapper">
        <div class="categories" id="categories">
            <button class="category-btn active" data-category="all">Semua</button>
        </div>
    </div>

    <!-- Produk Grid -->
    <main class="main-content">
        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>
    </main>

    <!-- Cart Sidebar / Overlay -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> Keranjang</h2>
            <button class="close-cart" id="closeCart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">
                <i class="fas fa-shopping-bag"></i>
                <p>Keranjang masih kosong</p>
            </div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display:none;">
            <div class="cart-total">
                <span>Total</span>
                <span class="total-price" id="totalPrice">Rp 0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">
                <i class="fab fa-whatsapp"></i> Checkout via WhatsApp
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="products-data.js"></script>
    <script src="assets/images/image-mapping.js"></script>
    <script src="script.js"></script>
</body>
</html>
