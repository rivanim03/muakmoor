name: Find Product Image URLs

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  schedule:
    - cron: '0 2 * * 0'  # Weekly: Sunday 2 AM UTC

permissions:
  contents: write

jobs:
  find-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Find image URLs (all products)
        run: |
          # First attempt: full, then resume failed ones in same run
          node scripts/find_image_urls.js --mode=full || true
          node scripts/find_image_urls.js --mode=resume || true
          node scripts/find_image_urls.js --mode=resume || true
        timeout-minutes: 350
        continue-on-error: true
        env:
          CI: true

      - name: Commit & push updated image-mapping.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/image-mapping.js assets/images/_mapping.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update product image URLs [skip ci]"
          git push
