name: Find Product Image URLs

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 * * * *'  # Every hour — 50 products per run

permissions:
  contents: write

jobs:
  find-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 50 items @ ~6s each = 5 min, 30 min plenty

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Google Chrome + Playwright + xvfb
        run: |
          # xvfb for virtual display (Chrome runs non-headless = undetectable)
          sudo apt-get install -y xvfb
          # Google Chrome Stable
          sudo mkdir -p /etc/apt/keyrings
          wget -q -O- https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /etc/apt/keyrings/google-chrome.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version
          # Playwright browsers as fallback
          npx playwright install --with-deps firefox chromium

      - name: Process next batch (50 products)
        run: xvfb-run --auto-servernum node scripts/find_image_urls.js --mode=batch
        timeout-minutes: 25
        env:
          CI: true

      - name: Commit & push updated image-mapping.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/image-mapping.js assets/images/_mapping.json assets/images/_failed.json assets/images/_debug_screenshot.png
          git diff --staged --quiet || git commit -m "🤖 Batch update product image URLs [skip ci]"
          git pull --rebase origin main
          git push
