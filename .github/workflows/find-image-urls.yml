name: Find Product Image URLs

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours — 50 products per run

permissions:
  contents: write

jobs:
  find-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 50 items @ ~6s each = 5 min, 30 min plenty

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Google Chrome + Playwright
        run: |
          # Install Google Chrome Stable (real Chrome, harder to detect)
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # Install Playwright browsers as fallback
          npx playwright install --with-deps firefox
          npx playwright install --with-deps chromium

      - name: Process next batch (50 products)
        run: node scripts/find_image_urls.js --mode=batch
        timeout-minutes: 25
        env:
          CI: true

      - name: Commit & push updated image-mapping.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/image-mapping.js assets/images/_mapping.json assets/images/_failed.json
          git diff --staged --quiet || git commit -m "🤖 Batch update product image URLs [skip ci]"
          git push
